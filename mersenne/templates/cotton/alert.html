<c-vars type="info" />
<div
    role="alert"
    class="alert {% if type == 'danger' %}alert-error{% elif type == 'warning' %}alert-warning{% elif type == 'success' %}alert-success{% elif type == 'info' %}alert-info{% endif %}"
>
    {% if type == 'danger' %}
    <c-heroicon.exclamation-triangle class="size-5" />
    {% elif type == 'warning' %}
    <c-heroicon.shield-exclamation class="size-5" />
    {% elif type == 'success' %}
    <c-heroicon.check-circle class="size-5" />
    {% elif type == 'info' %}
    <c-heroicon.information-circle class="size-5" />
    {% endif %}
    <span>{{ slot }}</span>
</div>
